<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAI — Intelligent Coding Assistant</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        surface: {
                            dark: '#0b0b12',
                            panel: '#111118',
                            card: '#1a1a24',
                            hover: '#22222f',
                            border: '#2a2a38',
                            muted: '#8888a0',
                            accent: '#6366f1',
                            'accent-glow': '#818cf8',
                        },
                        surfaceLight: {
                            bg: '#f8f9fb',
                            panel: '#ffffff',
                            card: '#f1f3f6',
                            hover: '#e8eaef',
                            border: '#dde0e5',
                            muted: '#6b7280',
                            accent: '#4f46e5',
                            'accent-glow': '#6366f1',
                        },
                    },
                },
            },
        };
    </script>

    <style>
        /* Smooth scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a4a;
            border-radius: 10px;
        }
        .light ::-webkit-scrollbar-thumb {
            background: #c5c5d0;
        }

        /* Code block styling */
        .code-block-wrapper {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            margin: 12px 0;
            border: 1px solid #2a2a38;
        }
        .light .code-block-wrapper {
            border-color: #dde0e5;
        }
        .code-block-wrapper pre {
            margin: 0;
            padding: 16px;
            padding-top: 40px;
            overflow-x: auto;
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', 'Consolas', monospace;
            font-size: 0.85rem;
            line-height: 1.65;
            background: #0d0d16;
            color: #e2e2f0;
        }
        .light .code-block-wrapper pre {
            background: #f5f5fa;
            color: #1e1e2e;
        }
        .code-block-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 36px;
            background: #1a1a28;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            z-index: 2;
            border-bottom: 1px solid #2a2a38;
        }
        .light .code-block-header {
            background: #e8eaf0;
            border-bottom-color: #d0d3db;
        }
        .code-lang-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #8888a0;
        }
        .copy-btn {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 5px;
            cursor: pointer;
            background: #2a2a38;
            color: #c0c0d0;
            border: none;
            transition: all 0.15s ease;
            font-weight: 500;
            letter-spacing: 0.03em;
        }
        .copy-btn:hover {
            background: #3a3a50;
            color: #fff;
        }
        .light .copy-btn {
            background: #dde0e5;
            color: #4b5563;
        }
        .light .copy-btn:hover {
            background: #c8ccd4;
            color: #1f2937;
        }
        .copy-btn.copied {
            background: #1a7f4b;
            color: #fff;
        }

        /* Syntax highlighting */
        .kw {
            color: #c792ea;
            font-weight: 600;
        }
        .light .kw {
            color: #7c3aed;
        }
        .str {
            color: #89dd89;
        }
        .light .str {
            color: #059669;
        }
        .num {
            color: #f78c6c;
        }
        .light .num {
            color: #d97706;
        }
        .cm {
            color: #676e95;
            font-style: italic;
        }
        .light .cm {
            color: #9ca3af;
        }
        .fn {
            color: #82aaff;
        }
        .light .fn {
            color: #2563eb;
        }
        .op {
            color: #ff5370;
        }
        .light .op {
            color: #dc2626;
        }
        .builtin {
            color: #ffcb6b;
        }
        .light .builtin {
            color: #b45309;
        }

        /* Glass effect */
        .glass-subtle {
            background: rgba(17, 17, 24, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .light .glass-subtle {
            background: rgba(255, 255, 255, 0.78);
        }

        /* Pulse for loading */
        @keyframes subtlePulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
        .ai-loading-dot {
            animation: subtlePulse 1.2s infinite;
        }
        .ai-loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .ai-loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        /* Fade in */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .msg-enter {
            animation: fadeInUp 0.25s ease forwards;
        }

        /* Transition for theme */
        * {
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.15s ease;
        }
    </style>

    <!-- Firebase v10 SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js">
    </script>
</head>

        const changeNameModal = $('#changeNameModal');

        const changePhotoModal = $('#changePhotoModal');
        const newPhotoUrlInput = $('#newPhotoUrlInput');
        const savePhotoBtn = $('#savePhotoBtn');
        const cancelPhotoBtn = $('#cancelPhotoBtn');

        // ==================== STATE ====================
        let currentUser = null;
        let currentChatId = null;
        let chatMessages = [];
        let voiceEnabled = false;
        let isAiResponding = false;
        let adminAuthed = false;
        let allChatsCache = {};

        // ==================== THEME MANAGEMENT ====================
        function getStoredTheme() {
            return localStorage.getItem('codeai_theme') || 'dark';
        }

        function applyTheme(theme) {
            const html = document.documentElement;
            if (theme === 'light') {
                html.classList.remove('dark');
                html.classList.add('light');
                themeIconDark.classList.add('hidden');
                themeIconLight.classList.remove('hidden');
                themeLabel.textContent = 'Dark Mode';
            } else {
                html.classList.add('dark');
                html.classList.remove('light');
                themeIconDark.classList.remove('hidden');
                themeIconLight.classList.add('hidden');
                themeLabel.textContent = 'Light Mode';
            }
            localStorage.setItem('codeai_theme', theme);
        }

        function toggleTheme() {
            const current = getStoredTheme();
            applyTheme(current === 'dark' ? 'light' : 'dark');
        }

        applyTheme(getStoredTheme());
        themeToggleBtn.addEventListener('click', toggleTheme);

        // ==================== VOICE TOGGLE ====================
        voiceToggleBtn.addEventListener('click', () => {
            voiceEnabled = !voiceEnabled;
            if (voiceEnabled) {
                voiceToggleDot.classList.add('translate-x-4');
                voiceToggleDot.classList.remove('translate-x-0');
                voiceToggleBtn.classList.add('bg-indigo-500');
                voiceToggleBtn.classList.remove('bg-[#2a2a38]', 'light:bg-[#d0d3db]');
                voiceToggleDot.classList.add('bg-white');
                voiceToggleDot.classList.remove('bg-gray-400');
                voiceToggleBtn.setAttribute('aria-checked', 'true');
            } else {
                voiceToggleDot.classList.remove('translate-x-4');
                voiceToggleDot.classList.add('translate-x-0');
                voiceToggleBtn.classList.remove('bg-indigo-500');
                voiceToggleBtn.classList.add('bg-[#2a2a38]', 'light:bg-[#d0d3db]');
                voiceToggleDot.classList.remove('bg-white');
                voiceToggleDot.classList.add('bg-gray-400');
                voiceToggleBtn.setAttribute('aria-checked', 'false');
                window.speechSynthesis.cancel();
            }
        });

        function speakText(text) {
            if (!voiceEnabled) return;
            window.speechSynthesis.cancel();
            const cleaned = text.replace(/```[\s\S]*?```/g, ' [code block omitted] ')
                .replace(/`([^`]+)`/g, ' $1 ')
                .replace(/[*_~#>\[\]()]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
            if (!cleaned) return;
            const utterance = new SpeechSynthesisUtterance(cleaned);
            utterance.rate = 1.05;
            utterance.pitch = 1.0;
            utterance.volume = 0.9;
            const voices = window.speechSynthesis.getVoices();
            const preferred = voices.find(v => v.name.includes('Google') || v.name.includes('Natural') || v.name
                .includes('Daniel') || v.name.includes('Samantha'));
            if (preferred) utterance.voice = preferred;
            window.speechSynthesis.speak(utterance);
        }

        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };

        // ==================== AUTHENTICATION (ANONYMOUS AUTO-LOGIN) ====================
        firebaseAuth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                dashboard.classList.remove('hidden');
                await storeUserPublicData(user);
                updateProfileUI(user);
                loadChatHistoryList();
                if (!currentChatId) {
                    resetChatView();
                }
            } else {
                // Auto sign-in anonymously
                try {
                    await firebaseAuth.signInAnonymously();
                } catch (err) {
                    console.error("Anonymous auth failed:", err);
                    alert("Failed to initialize anonymous session.");

            }
        });

        async function storeUserPublicData(user) {
            try {
                await firebaseDb.ref('users_public/' + user.uid).set({

                    lastSeen: new Date().toISOString(),

                console.warn("Could not store public user data:", err.message);

            if (user.photoURL) {
                profilePic.src = user.photoURL;

                profilePic.src =
                    'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%233a3a50" width="100" height="100"/><text x="50" y="55" text-anchor="middle" dy=".1em" fill="%23aaa" font-size="40" font-weight="bold">' +
                    (user.displayName ? user.displayName.charAt(0).toUpperCase() : 'G') + '</text></svg>';
            }

        // ==================== LOGOUT ====================

        // ==================== PROFILE UPDATES ====================
        changeNameBtn.addEventListener('click', () => {

        saveNameBtn.addEventListener('click', async () => {
            const newName = newNameInput.value.trim();
            if (!newName) return;
            try {
                await currentUser.updateProfile({ displayName: newName });
                await storeUserPublicData(currentUser);
                updateProfileUI(currentUser);
                changeNameModal.classList.add('hidden');
            } catch (err) {
                alert("Failed to update name: " + err.message);

        changePhotoBtn.addEventListener('click', () => {
            newPhotoUrlInput.value = currentUser?.photoURL || '';
            changePhotoModal.classList.remove('hidden');
        });
        cancelPhotoBtn.addEventListener('click', () => changePhotoModal.classList.add('hidden'));
        savePhotoBtn.addEventListener('click', async () => {
            const newUrl = newPhotoUrlInput.value.trim();
            if (!newUrl) return;

                await currentUser.updateProfile({ photoURL: newUrl });
                await storeUserPublicData(currentUser);

        // ==================== CHAT HISTORY LIST ====================
        async function loadChatHistoryList() {
            if (!currentUser) return;
            const chatsRef = firebaseDb.ref('users/' + currentUser.uid + '/chats');
            try {
                const snapshot = await chatsRef.once('value');
                const data = snapshot.val() || {};
                allChatsCache = data;
                renderChatHistoryList(data);
            } catch (err) {
                console.error("Error loading chat history:", err);
            }
        }

        function renderChatHistoryList(data) {
            const chatIds = Object.keys(data);
            if (chatIds.length === 0) {
                chatHistoryList.innerHTML =
                    '<p class="text-xs text-gray-500 light:text-gray-400 text-center py-8" id="noChatsMsg">No conversations yet</p>';
                return;
            }
            chatIds.sort((a, b) => {
                const tA = data[a].updatedAt || data[a].createdAt || '';
                const tB = data[b].updatedAt || data[b].createdAt || '';
                return tB.localeCompare(tA);
            });
            let html = '';
            chatIds.forEach(chatId => {
                const chat = data[chatId];
                const title = chat.title || 'New Chat';
                const isActive = chatId === currentChatId;
                html += `
                    <button data-chat-id="${chatId}"
                            class="w-full text-left py-2.5 px-3 rounded-lg text-sm transition-colors truncate block ${
                                isActive
                                    ? 'bg-indigo-600/20 text-indigo-300 light:bg-indigo-100 light:text-indigo-700 font-medium'
                                    : 'hover:bg-[#1a1a24] light:hover:bg-[#f1f3f6] text-gray-300 light:text-gray-700'
                            }">
                        ${escapeHtml(title)}
                    </button>`;
            });
            chatHistoryList.innerHTML = html;
            chatHistoryList.querySelectorAll('[data-chat-id]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const chatId = btn.getAttribute('data-chat-id');
                    openChat(chatId);
                });
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function openChat(chatId) {
            if (!currentUser || isAiResponding) return;
            window.speechSynthesis.cancel();
            currentChatId = chatId;
            const chatRef = firebaseDb.ref('users/' + currentUser.uid + '/chats/' + chatId);
            try {
                const snapshot = await chatRef.once('value');

        function resetChatView() {

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>

        // ==================== RENDER MESSAGES ====================
        function renderMessages() {
            if (chatMessages.length === 0) {
                resetChatView();
                return;
            }
            let html = '';
            chatMessages.forEach((msg) => {
                if (msg.role === 'user') {
                    html += `
                        <div class="msg-enter flex justify-end">
                            <div class="max-w-[75%] bg-indigo-600 text-white rounded-2xl rounded-br-md px-4 py-2.5 text-sm shadow-md">
                                ${escapeHtml(msg.content)}
                            </div>
                        </div>`;
                } else {
                    html += `
                        <div class="msg-enter flex justify-start">
                            <div class="max-w-[85%] bg-[#1a1a24] light:bg-white border border-[#2a2a38] light:border-[#dde0e5] rounded-2xl rounded-bl-md px-4 py-3 text-sm shadow-md ai-message-content">
                                ${formatAiContent(msg.content)}
                            </div>
                        </div>`;
                }
            });
            chatMessagesContainer.innerHTML = html;
            attachCopyListeners();
            scrollToBottom();
        }

        function formatAiContent(content) {
            let result = '';
            const parts = content.split(/(```[\s\S]*?```)/g);
            parts.forEach(part => {
                if (part.startsWith('```') && part.endsWith('```')) {
                    const inner = part.slice(3, -3);
                    const firstNewline = inner.indexOf('\n');
                    let lang = '';
                    let code = inner;
                    if (firstNewline > 0) {
                        lang = inner.slice(0, firstNewline).trim();
                        code = inner.slice(firstNewline + 1);
                    } else if (firstNewline === 0) {
                        code = inner.slice(1);
                    }
                    const langLabel = lang || 'code';
                    const highlighted = highlightCode(code, lang);
                    const escapedCode = escapeHtml(code);
                    result += `
                        <div class="code-block-wrapper">
                            <div class="code-block-header">
                                <span class="code-lang-label">${escapeHtml(langLabel)}</span>
                                <button class="copy-btn" data-code="${escapeHtml(code).replace(/"/g, '&quot;')}">Copy</button>
                            </div>
                            <pre><code>${highlighted}</code></pre>
                        </div>`;
                } else {
                    let textHtml = escapeHtml(part);
                    textHtml = textHtml.replace(/`([^`]+)`/g,
                        '<code class="bg-[#2a2a38] light:bg-[#e8eaef] px-1.5 py-0.5 rounded text-xs font-mono">$1</code>');
                    textHtml = textHtml.replace(/\n/g, '<br>');
                    result += textHtml;
                }
            });
            return result;
        }

        function highlightCode(code, lang) {
            const escaped = escapeHtml(code);
            const highlightableLangs = ['js', 'javascript', 'ts', 'typescript', 'py', 'python', 'java', 'c', 'cpp',
                'c++', 'go', 'rust', 'rs', 'rb', 'ruby', 'php', 'swift', 'kotlin', 'css', 'html', 'json', 'bash',
                'sh', 'sql'
            ];
            const l = (lang || '').toLowerCase();
            if (!highlightableLangs.includes(l) && lang) return escaped;
            let result = escaped;
            result = result.replace(/(\/\/.*$|\/\*[\s\S]*?\*\/|#.*$)/gm, '<span class="cm">$1</span>');
            result = result.replace(/(&quot;.*?&quot;|&#39;.*?&#39;|`.*?`|&apos;.*?&apos;)/g,
                '<span class="str">$1</span>');
            result = result.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
            const keywords = [
                'function', 'const', 'let', 'var', 'if', 'else', 'return', 'class', 'import', 'export',
                'from', 'async', 'await', 'try', 'catch', 'throw', 'new', 'this', 'super', 'extends',
                'static', 'public', 'private', 'protected', 'interface', 'type', 'enum', 'for', 'while',
                'do', 'switch', 'case', 'break', 'continue', 'default', 'typeof', 'instanceof', 'in',
                'of', 'def', 'elif', 'pass', 'yield', 'with', 'as', 'print', 'True', 'False', 'None',
                'and', 'or', 'not', 'is', 'lambda', 'raise', 'except', 'finally', 'assert', 'global',
                'nonlocal', 'void', 'int', 'float', 'string', 'boolean', 'bool', 'char', 'double',
                'long', 'short', 'byte', 'final', 'abstract', 'package', 'implements', 'null', 'undefined',
            ];
            const kwPattern = new RegExp('\\b(' + keywords.join('|') + ')\\b', 'g');
            result = result.replace(kwPattern, '<span class="kw">$1</span>');
            const builtins = [
                'console', 'log', 'document', 'window', 'Array', 'Object', 'String', 'Number', 'Math',
                'JSON', 'Promise', 'fetch', 'map', 'filter', 'reduce', 'forEach', 'push', 'pop',
                'parseInt', 'parseFloat', 'setTimeout', 'setInterval', 'require', 'module', 'process',
                'print', 'len', 'range', 'list', 'dict', 'set', 'tuple', 'str', 'int', 'open', 'close',
                'read', 'write', 'append', 'format', 'join', 'split',
            ];
            const biPattern = new RegExp('\\b(' + builtins.join('|') + ')\\b', 'g');
            result = result.replace(biPattern, '<span class="builtin">$1</span>');
            result = result.replace(/\b([a-zA-Z_$][a-zA-Z0-9_$]*)\s*\(/g, '<span class="fn">$1</span>(');
            return result;
        }

        function attachCopyListeners() {
            $$('.copy-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const code = btn.getAttribute('data-code');
                    const decoded = code.replace(/&quot;/g, '"').replace(/&amp;/g, '&')
                        .replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&#39;/g, "'")
                        .replace(/&apos;/g, "'");
                    try {
                        await navigator.clipboard.writeText(decoded);
                        btn.textContent = 'Copied!';
                        btn.classList.add('copied');
                        setTimeout(() => {
                            btn.textContent = 'Copy';
                            btn.classList.remove('copied');
                        }, 1800);
                    } catch {
                        btn.textContent = 'Failed';
                        setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
                    }
                });
            });
        }

        function scrollToBottom() {
            chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
        }

        // ==================== SEND MESSAGE ====================
        sendBtn.addEventListener('click', () => handleSendMessage());
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSendMessage();
            }
        });
        chatInput.addEventListener('input', () => {
            sendBtn.disabled = !chatInput.value.trim() || isAiResponding;
            chatInput.style.height = 'auto';
            chatInput.style.height = Math.min(chatInput.scrollHeight, 160) + 'px';
        });

        async function handleSendMessage() {
            if (!currentUser || isAiResponding) return;
            const content = chatInput.value.trim();
            if (!content) return;
            chatInput.value = '';
            chatInput.style.height = 'auto';
            sendBtn.disabled = true;
            isAiResponding = true;
            window.speechSynthesis.cancel();

            if (!currentChatId) {
                currentChatId = generateChatId();
                const title = content.length > 50 ? content.slice(0, 50) + '...' : content;
                currentChatTitle.textContent = title;
                const chatData = {
                    id: currentChatId,
                    title: title,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString(),
                    messages: [],
                };
                await firebaseDb.ref('users/' + currentUser.uid + '/chats/' + currentChatId).set(chatData);
            }

            const userMsg = {
                role: 'user',
                content: content,
                timestamp: new Date().toISOString(),
            };
            chatMessages.push(userMsg);
            await firebaseDb.ref('users/' + currentUser.uid + '/chats/' + currentChatId + '/messages').set(chatMessages);
            await firebaseDb.ref('users/' + currentUser.uid + '/chats/' + currentChatId + '/updatedAt').set(new Date()
                .toISOString());
            if (chatMessages.filter(m => m.role === 'user').length === 1) {
                const title = content.length > 50 ? content.slice(0, 50) + '...' : content;
                await firebaseDb.ref('users/' + currentUser.uid + '/chats/' + currentChatId + '/title').set(title);
                currentChatTitle.textContent = title;
            }
            renderMessages();
            await loadChatHistoryList();
            renderChatHistoryList(allChatsCache);
            scrollToBottom();

            const loadingHtml = `
                <div class="msg-enter flex justify-start" id="aiLoadingMsg">
                    <div class="max-w-[85%] bg-[#1a1a24] light:bg-white border border-[#2a2a38] light:border-[#dde0e5] rounded-2xl rounded-bl-md px-5 py-3.5 text-sm shadow-md">
                        <div class="flex items-center gap-1.5">
                            <span class="ai-loading-dot w-2 h-2 rounded-full bg-indigo-400 inline-block"></span>
                            <span class="ai-loading-dot w-2 h-2 rounded-full bg-indigo-400 inline-block"></span>
                            <span class="ai-loading-dot w-2 h-2 rounded-full bg-indigo-400 inline-block"></span>
                        </div>
                    </div>
                </div>`;
            chatMessagesContainer.insertAdjacentHTML('beforeend', loadingHtml);
            scrollToBottom();

            try {
                const aiResponse = await callGroqApi(chatMessages);
                const loadingEl = $('#aiLoadingMsg');
                if (loadingEl) loadingEl.remove();
                const aiMsg = {
                    role: 'assistant',
                    content: aiResponse,
                    timestamp: new Date().toISOString(),
                };
                chatMessages.push(aiMsg);
                await firebaseDb.ref('users/' + currentUser.uid + '/chats/' + currentChatId + '/messages').set(
                    chatMessages);
                await firebaseDb.ref('users/' + currentUser.uid + '/chats/' + currentChatId + '/updatedAt').set(new Date()
                    .toISOString());
                renderMessages();
                await loadChatHistoryList();
                renderChatHistoryList(allChatsCache);
                scrollToBottom();
                speakText(aiResponse);
            } catch (err) {
                const loadingEl = $('#aiLoadingMsg');
                if (loadingEl) loadingEl.remove();
                console.error("AI API error:", err);
                const errorMsg = {
                    role: 'assistant',
                    content: '**Error:** Unable to reach the AI service. Please check your API key and try again.\n\nDetails: ' +
                        err.message,
                    timestamp: new Date().toISOString(),
                };
                chatMessages.push(errorMsg);
                await firebaseDb.ref('users/' + currentUser.uid + '/chats/' + currentChatId + '/messages').set(
                    chatMessages);
                renderMessages();
                scrollToBottom();
            }

            isAiResponding = false;
            sendBtn.disabled = !chatInput.value.trim();
        }

        function generateChatId() {
            return 'chat_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
        }

        async function callGroqApi(messages) {
            const systemPrompt = {
                role: 'system',
                content: `You are CodeAI, an expert coding assistant powered by qwen-2.5-coder-32b.
Provide clear, accurate code solutions with proper markdown code blocks (e.g. \`\`\`javascript). Explain concisely.`,
            };
            const payload = {
                model: GROQ_MODEL,
                messages: [systemPrompt, ...messages.map(m => ({ role: m.role, content: m.content }))],
                temperature: 0.5,
                max_tokens: 4096,
                top_p: 0.95,
            };
            const response = await fetch(GROQ_API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + GROQ_API_KEY,
                },
                body: JSON.stringify(payload),
            });
            if (!response.ok) {
                const errBody = await response.text();
                throw new Error(`Groq API error ${response.status}: ${errBody}`);
            }
            const data = await response.json();
            if (!data.choices || data.choices.length === 0) throw new Error('No response from AI.');
            return data.choices[0].message.content;
        }

        async function loadAdminUsers() {
            if (!adminAuthed) return;
            adminUsersList.innerHTML = '<p class="text-gray-500 text-xs">Loading registered users...</p>';
            try {
                const snapshot = await firebaseDb.ref('users_public').once('value');
                const data = snapshot.val() || {};
                const users = Object.values(data);
                if (users.length === 0) {
                    adminUsersList.innerHTML = '<p class="text-gray-500 text-xs">No registered users found.</p>';
                    return;
                }
                let html = '';
                users.forEach((u) => {
                    html += `
                        <div class="p-3 rounded-lg bg-[#1a1a24] light:bg-[#f1f3f6] border border-[#2a2a38] light:border-[#dde0e5]">
                            <p class="font-medium text-sm">${escapeHtml(u.name || 'Unknown')}</p>
                            <p class="text-xs text-gray-400 light:text-gray-500">${escapeHtml(u.email || 'No email')}</p>
                            <p class="text-xs text-gray-500 light:text-gray-400 font-mono mt-0.5">UID: ${escapeHtml(u.uid || 'N/A')}</p>
                        </div>`;
                });
                adminUsersList.innerHTML = html;
            } catch (err) {
                adminUsersList.innerHTML = '<p class="text-red-400 text-xs">Failed to load users.</p>';
                console.error("Admin load error:", err);
            }
        }

        // ==================== INITIAL SETUP ====================
        dashboard.classList.remove('hidden'); // Show dashboard immediately while auth resolves

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                adminModal.classList.add('hidden');
                changeNameModal.classList.add('hidden');
                changePhotoModal.classList.add('hidden');
            }
        });

        console.log('%cCodeAI %cReady %c— Intelligent Coding Assistant',
            'color:#818cf8;font-weight:bold;font-size:1.1em;',
            'color:#22c55e;',
            'color:#8888a0;');
        console.log('%cConfigure Firebase & Groq API key to begin.',
            'color:#f59e0b;font-size:0.85em;');
    })();
</script>
</body>
</html>
